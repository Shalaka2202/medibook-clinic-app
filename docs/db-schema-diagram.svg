<svg viewBox="0 0 820 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="500" fill="#F8F6F1"/>
  <text x="410" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1A1714">MediBook – Database Schema (ER Diagram)</text>

  <!-- USERS TABLE -->
  <g transform="translate(30, 60)">
    <rect width="220" height="280" rx="10" fill="white" stroke="#2D6A4F" stroke-width="2"/>
    <rect width="220" height="36" rx="10" fill="#2D6A4F"/>
    <rect y="22" width="220" height="14" fill="#2D6A4F"/>
    <text x="110" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="white">USERS</text>

    <!-- PK row -->
    <rect x="1" y="36" width="218" height="28" fill="#FFF9E6"/>
    <text x="12" y="54" font-size="12" fill="#888">🔑</text>
    <text x="28" y="54" font-size="12" font-weight="bold" fill="#333">id</text>
    <text x="180" y="54" font-size="11" fill="#888">TEXT PK</text>

    <line x1="0" y1="64" x2="220" y2="64" stroke="#eee"/>
    <text x="12" y="82" font-size="12" fill="#333">name</text><text x="160" y="82" font-size="11" fill="#888">TEXT NN</text>
    <line x1="0" y1="88" x2="220" y2="88" stroke="#eee"/>
    <text x="12" y="106" font-size="12" fill="#333">email</text><text x="140" y="106" font-size="11" fill="#888">TEXT UNIQUE</text>
    <line x1="0" y1="112" x2="220" y2="112" stroke="#eee"/>
    <text x="12" y="130" font-size="12" fill="#333">password</text><text x="155" y="130" font-size="11" fill="#888">TEXT hash</text>
    <line x1="0" y1="136" x2="220" y2="136" stroke="#eee"/>
    <rect x="1" y="136" width="218" height="28" fill="#E8F5EE"/>
    <text x="12" y="154" font-size="12" fill="#333">role</text><text x="110" y="154" font-size="11" fill="#2D6A4F">patient|doctor|admin</text>
    <line x1="0" y1="164" x2="220" y2="164" stroke="#eee"/>
    <text x="12" y="182" font-size="12" fill="#333">phone</text><text x="155" y="182" font-size="11" fill="#888">TEXT null</text>
    <line x1="0" y1="188" x2="220" y2="188" stroke="#eee"/>
    <text x="12" y="206" font-size="12" fill="#333">created_at</text><text x="145" y="206" font-size="11" fill="#888">TEXT auto</text>
  </g>

  <!-- DOCTORS TABLE -->
  <g transform="translate(310, 60)">
    <rect width="220" height="300" rx="10" fill="white" stroke="#2D6A4F" stroke-width="2"/>
    <rect width="220" height="36" rx="10" fill="#2D6A4F"/>
    <rect y="22" width="220" height="14" fill="#2D6A4F"/>
    <text x="110" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="white">DOCTORS</text>

    <rect x="1" y="36" width="218" height="28" fill="#FFF9E6"/>
    <text x="12" y="54" font-size="12" fill="#888">🔑</text>
    <text x="28" y="54" font-size="12" font-weight="bold" fill="#333">id</text>
    <text x="180" y="54" font-size="11" fill="#888">TEXT PK</text>

    <line x1="0" y1="64" x2="220" y2="64" stroke="#eee"/>
    <rect x="1" y="64" width="218" height="28" fill="#FFF3E0"/>
    <text x="12" y="82" font-size="12" fill="#888">🔗</text>
    <text x="28" y="82" font-size="12" font-weight="bold" fill="#e65100">user_id</text>
    <text x="155" y="82" font-size="11" fill="#e65100">FK → users</text>

    <line x1="0" y1="92" x2="220" y2="92" stroke="#eee"/>
    <text x="12" y="110" font-size="12" fill="#333">specialization</text><text x="160" y="110" font-size="11" fill="#888">TEXT NN</text>
    <line x1="0" y1="116" x2="220" y2="116" stroke="#eee"/>
    <text x="12" y="134" font-size="12" fill="#333">qualification</text><text x="160" y="134" font-size="11" fill="#888">TEXT</text>
    <line x1="0" y1="140" x2="220" y2="140" stroke="#eee"/>
    <text x="12" y="158" font-size="12" fill="#333">experience_years</text><text x="168" y="158" font-size="11" fill="#888">INT</text>
    <line x1="0" y1="164" x2="220" y2="164" stroke="#eee"/>
    <text x="12" y="182" font-size="12" fill="#333">available_days</text><text x="160" y="182" font-size="11" fill="#888">TEXT</text>
    <line x1="0" y1="188" x2="220" y2="188" stroke="#eee"/>
    <text x="12" y="206" font-size="12" fill="#333">slot_duration</text><text x="155" y="206" font-size="11" fill="#888">INT (30)</text>
    <line x1="0" y1="212" x2="220" y2="212" stroke="#eee"/>
    <text x="12" y="230" font-size="12" fill="#333">fee</text><text x="160" y="230" font-size="11" fill="#888">REAL (500)</text>
  </g>

  <!-- Arrow users → doctors (1:1) -->
  <line x1="250" y1="148" x2="308" y2="148" stroke="#e65100" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#fk)"/>
  <text x="258" y="142" font-size="10" fill="#e65100">1</text>
  <text x="295" y="142" font-size="10" fill="#e65100">1</text>
  <defs>
    <marker id="fk" markerWidth="8" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#e65100"/>
    </marker>
    <marker id="fkblue" markerWidth="8" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#3949ab"/>
    </marker>
  </defs>

  <!-- APPOINTMENTS TABLE -->
  <g transform="translate(590, 60)">
    <rect width="210" height="380" rx="10" fill="white" stroke="#2D6A4F" stroke-width="2"/>
    <rect width="210" height="36" rx="10" fill="#2D6A4F"/>
    <rect y="22" width="210" height="14" fill="#2D6A4F"/>
    <text x="105" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="white">APPOINTMENTS</text>

    <rect x="1" y="36" width="208" height="28" fill="#FFF9E6"/>
    <text x="12" y="54" font-size="12" fill="#888">🔑</text>
    <text x="28" y="54" font-size="12" font-weight="bold" fill="#333">id</text>
    <text x="170" y="54" font-size="11" fill="#888">TEXT PK</text>

    <line x1="0" y1="64" x2="210" y2="64" stroke="#eee"/>
    <rect x="1" y="64" width="208" height="28" fill="#FFF3E0"/>
    <text x="12" y="82" font-size="12" fill="#888">🔗</text>
    <text x="28" y="82" font-size="12" font-weight="bold" fill="#e65100">patient_id</text>
    <text x="140" y="82" font-size="11" fill="#e65100">FK → users</text>

    <line x1="0" y1="92" x2="210" y2="92" stroke="#eee"/>
    <rect x="1" y="92" width="208" height="28" fill="#FFF3E0"/>
    <text x="12" y="110" font-size="12" fill="#888">🔗</text>
    <text x="28" y="110" font-size="12" font-weight="bold" fill="#3949ab">doctor_id</text>
    <text x="140" y="110" font-size="11" fill="#3949ab">FK → users</text>

    <line x1="0" y1="120" x2="210" y2="120" stroke="#eee"/>
    <text x="12" y="138" font-size="12" fill="#333">appointment_date</text><text x="168" y="138" font-size="11" fill="#888">TEXT</text>
    <line x1="0" y1="144" x2="210" y2="144" stroke="#eee"/>
    <text x="12" y="162" font-size="12" fill="#333">time_slot</text><text x="160" y="162" font-size="11" fill="#888">TEXT</text>
    <line x1="0" y1="168" x2="210" y2="168" stroke="#eee"/>
    <rect x="1" y="168" width="208" height="28" fill="#E8F5EE"/>
    <text x="12" y="186" font-size="12" fill="#333">status</text>
    <text x="60" y="186" font-size="10" fill="#2D6A4F">pending|confirmed|</text>
    <text x="60" y="198" font-size="10" fill="#2D6A4F">cancelled|completed</text>
    <line x1="0" y1="208" x2="210" y2="208" stroke="#eee"/>
    <text x="12" y="226" font-size="12" fill="#333">symptoms</text><text x="155" y="226" font-size="11" fill="#888">TEXT null</text>
    <line x1="0" y1="232" x2="210" y2="232" stroke="#eee"/>
    <text x="12" y="250" font-size="12" fill="#333">notes</text><text x="155" y="250" font-size="11" fill="#888">TEXT null</text>
    <line x1="0" y1="256" x2="210" y2="256" stroke="#eee"/>
    <text x="12" y="274" font-size="12" fill="#333">prescription</text><text x="155" y="274" font-size="11" fill="#888">TEXT null</text>
    <line x1="0" y1="280" x2="210" y2="280" stroke="#eee"/>
    <text x="12" y="298" font-size="12" fill="#333">created_at</text><text x="148" y="298" font-size="11" fill="#888">TEXT auto</text>

    <!-- Unique constraint label -->
    <rect x="1" y="315" width="208" height="58" fill="#FFF3E0" rx="6"/>
    <text x="8" y="332" font-size="10" font-weight="bold" fill="#e65100">UNIQUE constraint:</text>
    <text x="8" y="348" font-size="10" fill="#555">(doctor_id,</text>
    <text x="8" y="362" font-size="10" fill="#555"> appointment_date,</text>
    <text x="8" y="376" font-size="10" fill="#555"> time_slot)</text>
  </g>

  <!-- Arrow users → appointments.patient_id -->
  <path d="M 250 120 Q 420 440 588 120" stroke="#e65100" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#fk)"/>
  <text x="390" y="435" font-size="10" fill="#e65100">1..N patient</text>

  <!-- Arrow users → appointments.doctor_id -->
  <path d="M 250 160 Q 430 470 588 140" stroke="#3949ab" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#fkblue)"/>
  <text x="390" y="472" font-size="10" fill="#3949ab">1..N doctor</text>

  <!-- Legend -->
  <g transform="translate(30, 440)">
    <rect width="560" height="50" rx="8" fill="white" stroke="#e2ddd4"/>
    <text x="16" y="22" font-size="12" font-weight="bold" fill="#333">Legend:</text>
    <rect x="80" y="9" width="14" height="14" fill="#FFF9E6" stroke="#ccc"/>
    <text x="98" y="21" font-size="11" fill="#555">Primary Key</text>
    <rect x="185" y="9" width="14" height="14" fill="#FFF3E0" stroke="#ccc"/>
    <text x="203" y="21" font-size="11" fill="#555">Foreign Key</text>
    <rect x="290" y="9" width="14" height="14" fill="#E8F5EE" stroke="#ccc"/>
    <text x="308" y="21" font-size="11" fill="#555">Enum/Constrained</text>
    <text x="16" y="40" font-size="11" fill="#888">NN = NOT NULL  |  cascade delete on doctors when user deleted  |  UNIQUE prevents double-booking</text>
  </g>
</svg>
